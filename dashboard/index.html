<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custos — Security Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0a0c0f;
        --bg-2: #0f1217;
        --bg-3: #161b22;
        --bg-4: #1c2230;
        --border: #21283a;
        --border-2: #2d3748;
        --text: #c9d1d9;
        --text-2: #8b949e;
        --text-3: #484f58;
        --accent: #f0a500;
        --accent-dim: rgba(240, 165, 0, 0.12);
        --green: #3fb950;
        --green-dim: rgba(63, 185, 80, 0.1);
        --red: #f85149;
        --red-dim: rgba(248, 81, 73, 0.1);
        --orange: #e3650a;
        --orange-dim: rgba(227, 101, 10, 0.1);
        --yellow: #d29922;
        --yellow-dim: rgba(210, 153, 34, 0.1);
        --blue: #388bfd;
        --blue-dim: rgba(56, 139, 253, 0.1);
        --purple: #bc8cff;
        --purple-dim: rgba(188, 140, 255, 0.1);
        --mono: "JetBrains Mono", monospace;
        --sans: "Space Grotesk", sans-serif;
        --radius: 4px;
        --radius-lg: 8px;
      }
      html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
      #root { height: 100%; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-2); }
      ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
