version: "3.9"

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m arq worker.queue.WorkerSettings

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: Custos
      POSTGRES_PASSWORD: Custos
      POSTGRES_DB: Custos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Custos"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
